<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" role="img" aria-labelledby="yuccaTitle yuccaDesc">
  <title id="yuccaTitle">Animated yucca flowers over plains and mountains</title>
  <desc id="yuccaDesc">A layered vector banner with yucca flowers, plains, mountains, drifting wind lines, and a small call-to-action ribbon.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8dceb"/>
      <stop offset="0.54" stop-color="#f4dcc1"/>
      <stop offset="1" stop-color="#f6f2df"/>
    </linearGradient>
    <linearGradient id="sunwash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff8dc" stop-opacity="0.86"/>
      <stop offset="0.48" stop-color="#f4b06f" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mountainFar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7fa2b7" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#b9939a" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="mountainNear" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#557c90"/>
      <stop offset="1" stop-color="#9e6f72"/>
    </linearGradient>
    <linearGradient id="yuccaLeaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#223f45"/>
      <stop offset="0.45" stop-color="#5f816c"/>
      <stop offset="1" stop-color="#c6c58a"/>
    </linearGradient>
    <linearGradient id="flower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff8d7"/>
      <stop offset="0.62" stop-color="#f4ecd0"/>
      <stop offset="1" stop-color="#d6bd80"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#173047" flood-opacity="0.16"/>
    </filter>
    <style>
      .far-range { animation: yucca-parallax-far 28s ease-in-out infinite alternate; }
      .near-range { animation: yucca-parallax-near 24s ease-in-out infinite alternate; }
      .cloud-bank { animation: yucca-cloud-drift 54s linear infinite; }
      .wind-line {
        fill: none;
        stroke: rgba(255,255,255,0.66);
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-dasharray: 220 80;
        animation: yucca-wind 13s linear infinite;
      }
      .wind-line.thin { stroke-width: 1.2; opacity: 0.58; animation-duration: 18s; }
      .wind-line.gold { stroke: rgba(216,187,104,0.42); animation-duration: 16s; }
      .yucca-sway {
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: yucca-sway 6.8s ease-in-out infinite alternate;
      }
      .yucca-sway.slow { animation-duration: 8.4s; animation-delay: -1.1s; }
      .yucca-sway.fast { animation-duration: 5.9s; animation-delay: -2.2s; }
      .blossom {
        transform-box: fill-box;
        transform-origin: 50% 18%;
        animation: yucca-blossom 5.4s ease-in-out infinite alternate;
      }
      .blossom.d2 { animation-delay: -1.4s; }
      .blossom.d3 { animation-delay: -2.7s; }
      .leaf-sway {
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: yucca-leaf 7.5s ease-in-out infinite alternate;
      }
      .petal {
        transform-box: fill-box;
        transform-origin: 0 0;
        animation: yucca-petal 12s ease-in-out infinite;
      }
      .petal.p2 { animation-delay: -4s; }
      .petal.p3 { animation-delay: -8s; }
      .cta-pulse { animation: yucca-cta 4.6s ease-in-out infinite; }
      @keyframes yucca-parallax-far {
        from { transform: translateX(-8px); }
        to { transform: translateX(10px); }
      }
      @keyframes yucca-parallax-near {
        from { transform: translateX(12px); }
        to { transform: translateX(-12px); }
      }
      @keyframes yucca-cloud-drift {
        from { transform: translateX(-180px); }
        to { transform: translateX(1680px); }
      }
      @keyframes yucca-wind {
        from { stroke-dashoffset: 260; transform: translateX(-34px); }
        to { stroke-dashoffset: -260; transform: translateX(56px); }
      }
      @keyframes yucca-sway {
        from { transform: rotate(-1.9deg) translateX(-2px); }
        to { transform: rotate(2.4deg) translateX(3px); }
      }
      @keyframes yucca-blossom {
        from { transform: rotate(-3deg) translateY(0); }
        to { transform: rotate(2.2deg) translateY(2px); }
      }
      @keyframes yucca-leaf {
        from { transform: rotate(-1deg); }
        to { transform: rotate(1.6deg); }
      }
      @keyframes yucca-petal {
        0%, 100% { transform: translate(0, 0) rotate(-8deg); opacity: 0.9; }
        50% { transform: translate(34px, 9px) rotate(8deg); opacity: 0.58; }
      }
      @keyframes yucca-cta {
        0%, 100% { opacity: 0.84; transform: translateX(0); }
        50% { opacity: 1; transform: translateX(8px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .yucca-sway,
        .wind-line,
        .cta-pulse,
        .cloud-bank,
        .far-range,
        .near-range,
        .leaf-sway,
        .blossom,
        .petal {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <rect width="1600" height="720" fill="url(#sky)"/>
  <circle cx="1180" cy="250" r="250" fill="url(#sunwash)" opacity="0.74"/>
  <path d="M0 356c133-32 236-42 344-25 174 28 287 79 465 34 186-47 317-122 516-85 118 22 205 54 275 35v405H0z" fill="#f5d7a6" opacity="0.28"/>

