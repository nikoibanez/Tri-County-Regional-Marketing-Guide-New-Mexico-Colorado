      <path d="M12 54c-22-18-46-28-72-33" fill="none" stroke="#61723f" stroke-width="6" stroke-linecap="round"/>
      <path d="M18 116c25-17 52-27 82-32" fill="none" stroke="#61723f" stroke-width="6" stroke-linecap="round"/>
      <path d="M16 194c-22-15-48-25-78-29" fill="none" stroke="#61723f" stroke-width="6" stroke-linecap="round"/>
      <g class="blossom d2"><ellipse cx="-62" cy="24" rx="14" ry="28" fill="url(#flower)" transform="rotate(-16 -62 24)"/><ellipse cx="-39" cy="29" rx="12" ry="25" fill="url(#flower)" transform="rotate(18 -39 29)"/></g>
      <g class="blossom"><ellipse cx="92" cy="82" rx="14" ry="29" fill="url(#flower)" transform="rotate(24 92 82)"/><ellipse cx="68" cy="91" rx="12" ry="25" fill="url(#flower)" transform="rotate(-12 68 91)"/></g>
      <g class="blossom d3"><ellipse cx="-66" cy="167" rx="13" ry="28" fill="url(#flower)" transform="rotate(-20 -66 167)"/><ellipse cx="-42" cy="174" rx="12" ry="23" fill="url(#flower)" transform="rotate(12 -42 174)"/></g>
    </g>
  </g>

  <g id="right-yucca" opacity="0.92" transform="translate(1208 304) scale(0.72)">
