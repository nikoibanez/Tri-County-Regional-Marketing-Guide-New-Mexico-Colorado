    <path d="M426 262l44 99 66-10-88 42-14-74-58 28z" fill="#f5d8c1" opacity="0.52"/>
    <path d="M1098 298l74 129 88-24-120 62-32-96-72 42z" fill="#f5d8c1" opacity="0.46"/>
  </g>

  <g class="near-range">
    <path d="M0 496l174-92 160 54 214-138 178 138 128-70 182 92 218-158 346 166v232H0z" fill="url(#mountainNear)" opacity="0.74"/>
    <path d="M256 420c130 38 241 44 348 21 122-26 220-25 332 23 146 63 301 69 482 26v230H0V546c82-58 166-100 256-126z" fill="#d7c18a" opacity="0.44"/>
  </g>

  <g id="plains" opacity="0.96">
    <path d="M0 542c155-30 300-28 438 8 122 31 265 36 426 10 182-30 355-18 520 42 85 31 155 37 216 18v100H0z" fill="#d8bb68" opacity="0.36"/>
    <path d="M0 626c184-22 324-23 446-5 176 26 318 17 460-28 188-58 388-46 694 40v87H0z" fill="#9baa72" opacity="0.36"/>
    <path d="M0 673c236-34 438-34 606 0 180 37 315 40 496 5 178-34 340-26 498 22v20H0z" fill="#173047" opacity="0.12"/>
  </g>

  <g id="left-yucca" filter="url(#softShadow)" transform="translate(-18 34)">
    <g class="leaf-sway">
      <path d="M150 686l68-272 34 285z" fill="url(#yuccaLeaf)"/>
      <path d="M148 690l-64-245 118 246z" fill="#173047" opacity="0.9"/>
      <path d="M178 686l152-224-81 232z" fill="#59786a"/>
      <path d="M188 690l222-146-156 156z" fill="#2d5557"/>
      <path d="M118 690L0 512l168 176z" fill="#24474d"/>
      <path d="M204 692l66-174 7 181z" fill="#9baa72"/>
      <path d="M112 692L44 594l102 96z" fill="#5f816c"/>
