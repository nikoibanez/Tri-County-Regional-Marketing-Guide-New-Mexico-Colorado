      <path d="M24 208c30-20 61-30 96-32" fill="none" stroke="#657543" stroke-width="6" stroke-linecap="round"/>
      <g class="blossom"><ellipse cx="112" cy="38" rx="15" ry="31" fill="url(#flower)" transform="rotate(22 112 38)"/><ellipse cx="88" cy="45" rx="13" ry="28" fill="url(#flower)" transform="rotate(-12 88 45)"/></g>
      <g class="blossom d2"><ellipse cx="-68" cy="102" rx="15" ry="30" fill="url(#flower)" transform="rotate(-20 -68 102)"/><ellipse cx="-42" cy="108" rx="13" ry="27" fill="url(#flower)" transform="rotate(11 -42 108)"/></g>
      <g class="blossom d3"><ellipse cx="120" cy="180" rx="14" ry="29" fill="url(#flower)" transform="rotate(23 120 180)"/><ellipse cx="94" cy="187" rx="12" ry="25" fill="url(#flower)" transform="rotate(-12 94 187)"/></g>
