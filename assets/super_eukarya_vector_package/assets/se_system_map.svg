<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
<title id="title">Regional Outreach System</title>
<desc id="desc">A regional outreach system map with centered boxes for need, source, channel, tracking, packet updates, and trust.</desc>
<defs>
<style>
  .title { font: 800 38px Arial, sans-serif; fill: #142B44; letter-spacing: 0; }
  .subtitle { font: 700 16px Arial, sans-serif; fill: #736646; letter-spacing: 0; }
  .card-title { font: 800 19px Arial, sans-serif; fill: #142B44; letter-spacing: 0; }
  .card-title-sm { font: 800 16px Arial, sans-serif; fill: #142B44; letter-spacing: 0; }
  .card-body { font: 600 14px Arial, sans-serif; fill: #4A5563; letter-spacing: 0; }
  .card-body-sm { font: 600 13px Arial, sans-serif; fill: #4A5563; letter-spacing: 0; }
  .invert-title { font: 800 22px Arial, sans-serif; fill: #F7F3EA; letter-spacing: 0; }
  .invert-body { font: 600 14px Arial, sans-serif; fill: #F7F3EA; opacity: .86; letter-spacing: 0; }
  .micro { font: 700 12px Arial, sans-serif; fill: #736646; letter-spacing: 0; }
  .card { fill: #FFFFFF; stroke: #DED6C6; stroke-width: 2; vector-effect: non-scaling-stroke; }
  .soft { fill: #FFFFFF; opacity: .68; stroke: #DED6C6; stroke-width: 1.6; vector-effect: non-scaling-stroke; }
  .line { fill: none; stroke: #B9A36A; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
  .line-soft { fill: none; stroke: #142B44; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; opacity: .22; vector-effect: non-scaling-stroke; }
</style>
<marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
  <path d="M2 2 L11 7 L2 12 Z" fill="#B9A36A"/>
</marker>
</defs>
<rect width="1200" height="720" fill="#F7F3EA"/>
<text x="72" y="80" class="title">Regional Outreach System</text>
<text x="74" y="116" class="subtitle">Use this to connect needs, sources, channels, and follow-up.</text>
<line x1="72" y1="148" x2="1128" y2="148" stroke="#B9A36A" stroke-width="3" stroke-linecap="round"/>

<path d="M600 348 L600 226 M600 348 L854 286 M600 348 L854 494 M600 348 L600 596 M600 348 L346 494 M600 348 L346 286" class="line-soft"/>
<circle cx="600" cy="348" r="78" fill="#142B44"/>
<text x="600" y="338" text-anchor="middle" class="invert-title">Regional core</text>
<text x="600" y="366" text-anchor="middle" class="invert-body">Shared sources</text>
<text x="600" y="384" text-anchor="middle" class="invert-body">and follow-up</text>

<g>
  <rect x="486" y="180" width="228" height="100" rx="18" class="card"/>
  <rect x="504" y="198" width="34" height="8" rx="4" fill="#6CB894"/>
  <text x="600" y="217" text-anchor="middle" class="card-title">Start with need</text>
  <text x="600" y="247" text-anchor="middle" class="card-body">Name the audience</text>
<text x="600" y="265" text-anchor="middle" class="card-body">before the channel.</text>
</g>

<g>
  <rect x="742" y="240" width="228" height="100" rx="18" class="card"/>
  <rect x="760" y="258" width="34" height="8" rx="4" fill="#5BAEAD"/>
  <text x="856" y="277" text-anchor="middle" class="card-title">Find source</text>
  <text x="856" y="307" text-anchor="middle" class="card-body">Use directories, maps,</text>
<text x="856" y="325" text-anchor="middle" class="card-body">calendars, and offices.</text>
</g>

<g>
  <rect x="742" y="448" width="228" height="100" rx="18" class="card"/>
  <rect x="760" y="466" width="34" height="8" rx="4" fill="#6F8FC9"/>
  <text x="856" y="485" text-anchor="middle" class="card-title">Choose channel</text>
  <text x="856" y="515" text-anchor="middle" class="card-body">Match public, media,</text>
<text x="856" y="533" text-anchor="middle" class="card-body">partner, or social routes.</text>
</g>

<g>
  <rect x="486" y="572" width="228" height="100" rx="18" class="card"/>
  <rect x="504" y="590" width="34" height="8" rx="4" fill="#B9A36A"/>
  <text x="600" y="609" text-anchor="middle" class="card-title">Track response</text>
  <text x="600" y="639" text-anchor="middle" class="card-body">Record who answered</text>
<text x="600" y="657" text-anchor="middle" class="card-body">and what changed.</text>
</g>

<g>
  <rect x="230" y="448" width="228" height="100" rx="18" class="card"/>
  <rect x="248" y="466" width="34" height="8" rx="4" fill="#D48964"/>
  <text x="344" y="485" text-anchor="middle" class="card-title">Update packet</text>
  <text x="344" y="515" text-anchor="middle" class="card-body">Improve the blurb,</text>
<text x="344" y="533" text-anchor="middle" class="card-body">image, link, or ask.</text>
</g>

<g>
  <rect x="230" y="240" width="228" height="100" rx="18" class="card"/>
  <rect x="248" y="258" width="34" height="8" rx="4" fill="#695674"/>
  <text x="344" y="277" text-anchor="middle" class="card-title">Build trust</text>
  <text x="344" y="307" text-anchor="middle" class="card-body">Confirm details before</text>
<text x="344" y="325" text-anchor="middle" class="card-body">posting or spending.</text>
</g>
<path d="M208 652 C380 610 820 610 992 652" class="line"/>
<text x="600" y="684" text-anchor="middle" class="micro">Use this map to move from a local idea to a repeatable outreach path.</text>

</svg>
