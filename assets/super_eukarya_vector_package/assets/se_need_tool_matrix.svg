<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
<title id="title">Use by Need</title>
<desc id="desc">A use-by-need matrix with centered cards for new businesses, existing businesses, nonprofits, artists, events, and rural services.</desc>
<defs>
<style>
  .title { font: 800 38px Arial, sans-serif; fill: #142B44; letter-spacing: 0; }
  .subtitle { font: 700 16px Arial, sans-serif; fill: #736646; letter-spacing: 0; }
  .card-title { font: 800 19px Arial, sans-serif; fill: #142B44; letter-spacing: 0; }
  .card-title-sm { font: 800 16px Arial, sans-serif; fill: #142B44; letter-spacing: 0; }
  .card-body { font: 600 14px Arial, sans-serif; fill: #4A5563; letter-spacing: 0; }
  .card-body-sm { font: 600 13px Arial, sans-serif; fill: #4A5563; letter-spacing: 0; }
  .invert-title { font: 800 22px Arial, sans-serif; fill: #F7F3EA; letter-spacing: 0; }
  .invert-body { font: 600 14px Arial, sans-serif; fill: #F7F3EA; opacity: .86; letter-spacing: 0; }
  .micro { font: 700 12px Arial, sans-serif; fill: #736646; letter-spacing: 0; }
  .card { fill: #FFFFFF; stroke: #DED6C6; stroke-width: 2; vector-effect: non-scaling-stroke; }
  .soft { fill: #FFFFFF; opacity: .68; stroke: #DED6C6; stroke-width: 1.6; vector-effect: non-scaling-stroke; }
  .line { fill: none; stroke: #B9A36A; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
  .line-soft { fill: none; stroke: #142B44; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; opacity: .22; vector-effect: non-scaling-stroke; }
</style>
<marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
  <path d="M2 2 L11 7 L2 12 Z" fill="#B9A36A"/>
</marker>
</defs>
<rect width="1200" height="720" fill="#F7F3EA"/>
<text x="72" y="80" class="title">Use by Need</text>
<text x="74" y="116" class="subtitle">Use this to choose the right section without reading the guide in order.</text>
<line x1="72" y1="148" x2="1128" y2="148" stroke="#B9A36A" stroke-width="3" stroke-linecap="round"/>

<g>
  <rect x="72" y="184" width="344" height="156" rx="18" class="card"/>
  <rect x="90" y="202" width="34" height="8" rx="4" fill="#6CB894"/>
  <text x="244" y="240.5" text-anchor="middle" class="card-title">New business</text>
  <text x="244" y="270.5" text-anchor="middle" class="card-body">Claim core listings;</text>
<text x="244" y="288.5" text-anchor="middle" class="card-body">ask one support office.</text>
<text x="244" y="306.5" text-anchor="middle" class="card-body">Open the matched page.</text>
</g>

<g>
  <rect x="428" y="184" width="344" height="156" rx="18" class="card"/>
  <rect x="446" y="202" width="34" height="8" rx="4" fill="#6F8FC9"/>
  <text x="600" y="240.5" text-anchor="middle" class="card-title">Existing business</text>
  <text x="600" y="270.5" text-anchor="middle" class="card-body">Update stale profiles;</text>
<text x="600" y="288.5" text-anchor="middle" class="card-body">reach nearby counties.</text>
<text x="600" y="306.5" text-anchor="middle" class="card-body">Open the matched page.</text>
</g>

<g>
  <rect x="784" y="184" width="344" height="156" rx="18" class="card"/>
  <rect x="802" y="202" width="34" height="8" rx="4" fill="#5BAEAD"/>
  <text x="956" y="240.5" text-anchor="middle" class="card-title">Nonprofit program</text>
  <text x="956" y="270.5" text-anchor="middle" class="card-body">Lead with benefit;</text>
<text x="956" y="288.5" text-anchor="middle" class="card-body">show referral path.</text>
<text x="956" y="306.5" text-anchor="middle" class="card-body">Open the matched page.</text>
</g>

<g>
  <rect x="72" y="396" width="344" height="156" rx="18" class="card"/>
  <rect x="90" y="414" width="34" height="8" rx="4" fill="#D48964"/>
  <text x="244" y="452.5" text-anchor="middle" class="card-title">Artist or gallery</text>
  <text x="244" y="482.5" text-anchor="middle" class="card-body">Connect work to place,</text>
<text x="244" y="500.5" text-anchor="middle" class="card-body">date, and visitor path.</text>
<text x="244" y="518.5" text-anchor="middle" class="card-body">Open the matched page.</text>
</g>

<g>
  <rect x="428" y="396" width="344" height="156" rx="18" class="card"/>
  <rect x="446" y="414" width="34" height="8" rx="4" fill="#B9A36A"/>
  <text x="600" y="452.5" text-anchor="middle" class="card-title">Event organizer</text>
  <text x="600" y="482.5" text-anchor="middle" class="card-body">Make one clean packet;</text>
<text x="600" y="500.5" text-anchor="middle" class="card-body">submit to calendars.</text>
<text x="600" y="518.5" text-anchor="middle" class="card-body">Open the matched page.</text>
</g>

<g>
  <rect x="784" y="396" width="344" height="156" rx="18" class="card"/>
  <rect x="802" y="414" width="34" height="8" rx="4" fill="#695674"/>
  <text x="956" y="452.5" text-anchor="middle" class="card-title">Rural service</text>
  <text x="956" y="482.5" text-anchor="middle" class="card-body">Make referrals easy;</text>
<text x="956" y="500.5" text-anchor="middle" class="card-body">state area and next step.</text>
<text x="956" y="518.5" text-anchor="middle" class="card-body">Open the matched page.</text>
</g>
<rect x="238" y="644" width="724" height="34" rx="17" class="soft"/>
<text x="600" y="666" text-anchor="middle" class="micro">Each box tells the reader what to do first, then where to go next.</text>

</svg>
