<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
<title id="title">Funding Readiness Pipeline</title>
<desc id="desc">A funding readiness pipeline with six centered cards for need, proof, fit, support, application, and tracking.</desc>
<defs>
<style>
  .title { font: 800 38px Arial, sans-serif; fill: #142B44; letter-spacing: 0; }
  .subtitle { font: 700 16px Arial, sans-serif; fill: #736646; letter-spacing: 0; }
  .card-title { font: 800 19px Arial, sans-serif; fill: #142B44; letter-spacing: 0; }
  .card-title-sm { font: 800 16px Arial, sans-serif; fill: #142B44; letter-spacing: 0; }
  .card-body { font: 600 14px Arial, sans-serif; fill: #4A5563; letter-spacing: 0; }
  .card-body-sm { font: 600 13px Arial, sans-serif; fill: #4A5563; letter-spacing: 0; }
  .invert-title { font: 800 22px Arial, sans-serif; fill: #F7F3EA; letter-spacing: 0; }
  .invert-body { font: 600 14px Arial, sans-serif; fill: #F7F3EA; opacity: .86; letter-spacing: 0; }
  .micro { font: 700 12px Arial, sans-serif; fill: #736646; letter-spacing: 0; }
  .card { fill: #FFFFFF; stroke: #DED6C6; stroke-width: 2; vector-effect: non-scaling-stroke; }
  .soft { fill: #FFFFFF; opacity: .68; stroke: #DED6C6; stroke-width: 1.6; vector-effect: non-scaling-stroke; }
  .line { fill: none; stroke: #B9A36A; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
  .line-soft { fill: none; stroke: #142B44; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; opacity: .22; vector-effect: non-scaling-stroke; }
</style>
<marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
  <path d="M2 2 L11 7 L2 12 Z" fill="#B9A36A"/>
</marker>
</defs>
<rect width="1200" height="720" fill="#F7F3EA"/>
<text x="72" y="80" class="title">Funding Readiness Pipeline</text>
<text x="74" y="116" class="subtitle">Use this to prepare before treating any grant or loan as a fit.</text>
<line x1="72" y1="148" x2="1128" y2="148" stroke="#B9A36A" stroke-width="3" stroke-linecap="round"/>
<path d="M112 410 H1088" class="line" marker-end="url(#arrow)" opacity=".58"/>
<g>
  <rect x="74" y="250" width="158" height="160" rx="18" class="card"/>
  <rect x="92" y="268" width="34" height="8" rx="4" fill="#6CB894"/>
  <text x="153" y="317" text-anchor="middle" class="card-title-sm">Define need</text>
  <text x="153" y="347" text-anchor="middle" class="card-body-sm">What money or help</text>
<text x="153" y="365" text-anchor="middle" class="card-body-sm">is actually needed?</text>
</g>

<g>
  <rect x="250" y="250" width="158" height="160" rx="18" class="card"/>
  <rect x="268" y="268" width="34" height="8" rx="4" fill="#6F8FC9"/>
  <text x="329" y="317" text-anchor="middle" class="card-title-sm">Gather proof</text>
  <text x="329" y="347" text-anchor="middle" class="card-body-sm">Budget, timeline,</text>
<text x="329" y="365" text-anchor="middle" class="card-body-sm">impact, and records.</text>
</g>

<g>
  <rect x="426" y="250" width="158" height="160" rx="18" class="card"/>
  <rect x="444" y="268" width="34" height="8" rx="4" fill="#5BAEAD"/>
  <text x="505" y="317" text-anchor="middle" class="card-title-sm">Check fit</text>
  <text x="505" y="347" text-anchor="middle" class="card-body-sm">Eligibility, geography,</text>
<text x="505" y="365" text-anchor="middle" class="card-body-sm">and deadline.</text>
</g>

<g>
  <rect x="602" y="250" width="158" height="160" rx="18" class="card"/>
  <rect x="620" y="268" width="34" height="8" rx="4" fill="#B9A36A"/>
  <text x="681" y="317" text-anchor="middle" class="card-title-sm">Ask support</text>
  <text x="681" y="347" text-anchor="middle" class="card-body-sm">SBDC, EDD, chamber,</text>
<text x="681" y="365" text-anchor="middle" class="card-body-sm">or fiscal partner.</text>
</g>

<g>
  <rect x="778" y="250" width="158" height="160" rx="18" class="card"/>
  <rect x="796" y="268" width="34" height="8" rx="4" fill="#D48964"/>
  <text x="857" y="317" text-anchor="middle" class="card-title-sm">Apply cleanly</text>
  <text x="857" y="347" text-anchor="middle" class="card-body-sm">Use complete forms</text>
<text x="857" y="365" text-anchor="middle" class="card-body-sm">and plain outcomes.</text>
</g>

<g>
  <rect x="954" y="250" width="158" height="160" rx="18" class="card"/>
  <rect x="972" y="268" width="34" height="8" rx="4" fill="#695674"/>
  <text x="1033" y="317" text-anchor="middle" class="card-title-sm">Track result</text>
  <text x="1033" y="347" text-anchor="middle" class="card-body-sm">Note decision, date,</text>
<text x="1033" y="365" text-anchor="middle" class="card-body-sm">and next attempt.</text>
</g>
<rect x="238" y="522" width="724" height="52" rx="26" class="soft"/>
<text x="600" y="555" text-anchor="middle" class="micro">Use this only after verifying current eligibility, deadlines, and contact paths.</text>

</svg>
