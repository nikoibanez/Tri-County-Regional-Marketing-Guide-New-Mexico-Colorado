<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc" shape-rendering="geometricPrecision">
<title id="title">Bulletin and Media Network</title>
<desc id="desc">A bulletin and media network diagram with six centered cards and descriptions for posting paths.</desc>
<defs>
<style>
  .title { font: 800 38px Arial, sans-serif; fill: #142B44; letter-spacing: 0; }
  .subtitle { font: 700 16px Arial, sans-serif; fill: #736646; letter-spacing: 0; }
  .card-title { font: 800 19px Arial, sans-serif; fill: #142B44; letter-spacing: 0; }
  .card-title-sm { font: 800 16px Arial, sans-serif; fill: #142B44; letter-spacing: 0; }
  .card-body { font: 600 14px Arial, sans-serif; fill: #4A5563; letter-spacing: 0; }
  .card-body-sm { font: 600 13px Arial, sans-serif; fill: #4A5563; letter-spacing: 0; }
  .invert-title { font: 800 22px Arial, sans-serif; fill: #F7F3EA; letter-spacing: 0; }
  .invert-body { font: 600 14px Arial, sans-serif; fill: #F7F3EA; opacity: .86; letter-spacing: 0; }
  .micro { font: 700 12px Arial, sans-serif; fill: #736646; letter-spacing: 0; }
  .card { fill: #FFFFFF; stroke: #DED6C6; stroke-width: 2; vector-effect: non-scaling-stroke; }
  .soft { fill: #FFFFFF; opacity: .68; stroke: #DED6C6; stroke-width: 1.6; vector-effect: non-scaling-stroke; }
  .line { fill: none; stroke: #B9A36A; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
  .line-soft { fill: none; stroke: #142B44; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; opacity: .22; vector-effect: non-scaling-stroke; }
</style>
<marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
  <path d="M2 2 L11 7 L2 12 Z" fill="#B9A36A"/>
</marker>
</defs>
<rect width="1200" height="720" fill="#F7F3EA"/>
<text x="72" y="80" class="title">Bulletin and Media Network</text>
<text x="74" y="116" class="subtitle">Use this to separate civic posting, community promotion, and media outreach.</text>
<line x1="72" y1="148" x2="1128" y2="148" stroke="#B9A36A" stroke-width="3" stroke-linecap="round"/>

<g>
  <rect x="72" y="196" width="344" height="146" rx="18" class="card"/>
  <rect x="90" y="214" width="34" height="8" rx="4" fill="#142B44"/>
  <text x="244" y="256" text-anchor="middle" class="card-title">Official notice</text>
  <text x="244" y="286" text-anchor="middle" class="card-body">City or county page</text>
<text x="244" y="304" text-anchor="middle" class="card-body">for civic information.</text>
</g>

<g>
  <rect x="428" y="196" width="344" height="146" rx="18" class="card"/>
  <rect x="446" y="214" width="34" height="8" rx="4" fill="#B9A36A"/>
  <text x="600" y="256" text-anchor="middle" class="card-title">Public board</text>
  <text x="600" y="286" text-anchor="middle" class="card-body">Physical posting route</text>
<text x="600" y="304" text-anchor="middle" class="card-body">that needs permission.</text>
</g>

<g>
  <rect x="784" y="196" width="344" height="146" rx="18" class="card"/>
  <rect x="802" y="214" width="34" height="8" rx="4" fill="#6CB894"/>
  <text x="956" y="256" text-anchor="middle" class="card-title">Community calendar</text>
  <text x="956" y="286" text-anchor="middle" class="card-body">Event details with date,</text>
<text x="956" y="304" text-anchor="middle" class="card-body">location, and link.</text>
</g>

<g>
  <rect x="72" y="430" width="344" height="146" rx="18" class="card"/>
  <rect x="90" y="448" width="34" height="8" rx="4" fill="#6F8FC9"/>
  <text x="244" y="490" text-anchor="middle" class="card-title">Local media</text>
  <text x="244" y="520" text-anchor="middle" class="card-body">Radio or newspaper</text>
<text x="244" y="538" text-anchor="middle" class="card-body">for public reach.</text>
</g>

<g>
  <rect x="428" y="430" width="344" height="146" rx="18" class="card"/>
  <rect x="446" y="448" width="34" height="8" rx="4" fill="#5BAEAD"/>
  <text x="600" y="490" text-anchor="middle" class="card-title">Partner share</text>
  <text x="600" y="520" text-anchor="middle" class="card-body">Chamber, library, school,</text>
<text x="600" y="538" text-anchor="middle" class="card-body">district, or nonprofit.</text>
</g>

<g>
  <rect x="784" y="430" width="344" height="146" rx="18" class="card"/>
  <rect x="802" y="448" width="34" height="8" rx="4" fill="#D48964"/>
  <text x="956" y="490" text-anchor="middle" class="card-title">Digital post</text>
  <text x="956" y="520" text-anchor="middle" class="card-body">Social or email copy</text>
<text x="956" y="538" text-anchor="middle" class="card-body">for quick sharing.</text>
</g>
<path d="M244 370 H956" class="line" marker-end="url(#arrow)" opacity=".5"/>
<text x="600" y="386" text-anchor="middle" class="micro">Verify rules before posting; choose the channel that matches the request.</text>

</svg>
