[build]
  command = "python tools/build_netlify_deep_guide.py"
  publish = "dist/tri-county-netlify-guide-deep"

[build.environment]
  PYTHON_VERSION = "3.11"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"
