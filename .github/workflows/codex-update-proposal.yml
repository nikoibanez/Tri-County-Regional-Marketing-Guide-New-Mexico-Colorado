name: Codex update proposal

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  codex-proposal:
    if: ${{ vars.ENABLE_CODEX_UPDATES == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run Codex proposal review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/source-update-review.md
          sandbox: workspace-write
          output-file: codex-update-proposal.md

      - name: Upload Codex proposal
        uses: actions/upload-artifact@v4
        with:
          name: codex-update-proposal
          path: codex-update-proposal.md
